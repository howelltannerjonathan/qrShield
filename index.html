<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>qrShield</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #06111f;
      color: #d7ecff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 760px;
      background: #102338;
      border: 1px solid #8ccfff;
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 30px rgba(53, 200, 255, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 56px;
      color: #ffffff;
    }

    h1 span {
      color: #9da7b3;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      margin: 16px 0;
    }

    .button {
      display: inline-block;
      margin-top: 22px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #0877ff;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border: 2px solid #35c8ff;
    }

    .small {
      margin-top: 24px;
      font-size: 14px;
      color: #9fc4d9;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>qr<span>Shield</span></h1>

    <p>
      Know where a QR code leads before you open it.
    </p>

    <p>
      qrShield helps inspect QR code links for redirects, suspicious URL patterns,
      threat intelligence reputation, and potential security risks.
    </p>

    <a class="button" href="privacy.html">Privacy Policy</a>

    <p class="small">
      Coming soon to iOS and Android.
    </p>
  </div>
</body>
</html>
